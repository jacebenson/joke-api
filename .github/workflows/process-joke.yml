name: Process Joke Submission

on:
  issues:
    types: [labeled]

jobs:
  add-joke:
    if: github.event.label.name == 'add-joke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Extract joke from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            console.log('Issue body:', body);
            
            // Parse the form data from the issue body
            // Format is:
            // Joke Type
            // [type]
            // The Setup / Joke
            // [joke text]
            // The Punchline
            // [punchline text or blank]
            // Confirmation
            
            const lines = body.split('\n').map(l => l.trim());
            
            let setup = '';
            let punchline = null;
            let inSetup = false;
            let inPunchline = false;
            
            for (let i = 0; i < lines.length; i++) {
              const line = lines[i];
              
              if (line === 'The Setup / Joke') {
                inSetup = true;
                inPunchline = false;
                continue;
              }
              
              if (line === 'The Punchline') {
                inSetup = false;
                inPunchline = true;
                continue;
              }
              
              if (line === 'Confirmation' || line.startsWith('[')) {
                inSetup = false;
                inPunchline = false;
                continue;
              }
              
              if (inSetup && line && !setup) {
                setup = line;
              }
              
              if (inPunchline && line && !line.startsWith('_No response_') && punchline === null) {
                punchline = line;
              }
            }
            
            console.log('Extracted setup:', setup);
            console.log('Extracted punchline:', punchline);
            
            core.setOutput('setup', setup);
            core.setOutput('punchline', punchline || '');
            core.setOutput('issue_number', context.payload.issue.number);
      
      - name: Add joke to collection
        run: |
          node << 'NODE_SCRIPT'
            const fs = require('fs');
            const path = './src/_data/jokes.js';
            
            // Read current jokes
            let content = fs.readFileSync(path, 'utf8');
            
            // Extract the array - look for module.exports = [...]
            const match = content.match(/module\.exports\s*=\s*(\[[\s\S]*\]);?\s*$/);
            if (!match) {
              console.error('Could not parse jokes file');
              console.error('Content preview:', content.substring(0, 200));
              process.exit(1);
            }
            
            // Safely parse the array
            let jokes;
            try {
              jokes = eval(match[1]);
            } catch (e) {
              console.error('Failed to parse jokes array:', e);
              process.exit(1);
            }
            
            // Get values from environment (GitHub Actions passes these)
            const setup = process.env.JOKE_SETUP;
            const punchlineStr = process.env.JOKE_PUNCHLINE;
            
            if (!setup) {
              console.error('No joke setup found in issue');
              process.exit(1);
            }
            
            // Add new joke
            const newJoke = {
              joke: setup,
              punchline: punchlineStr || null
            };
            
            jokes.push(newJoke);
            
            // Write back with proper formatting
            const newContent = `module.exports = ${JSON.stringify(jokes, null, 2)};\n`;
            fs.writeFileSync(path, newContent);
            
            console.log('Added joke:', newJoke);
          NODE_SCRIPT
        env:
          JOKE_SETUP: ${{ steps.extract.outputs.setup }}
          JOKE_PUNCHLINE: ${{ steps.extract.outputs.punchline }}
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/jokes.js
          git commit -m "Add joke from issue #${{ steps.extract.outputs.issue_number }}"
          git push
      
      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Your joke has been added to the collection! Thanks for contributing!'
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
