name: Process Joke Submission

on:
  issues:
    types: [labeled]

jobs:
  add-joke:
    if: github.event.label.name == 'add-joke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Extract and add joke
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './src/_data/jokes.js';
            
            // Parse the issue body
            const body = context.payload.issue.body;
            console.log('Parsing issue body...');
            
            // Extract using regex for markdown headers
            const setupMatch = body.match(/### The Setup \/ Joke\s*\n\s*([^\n]+)/);
            const punchlineMatch = body.match(/### The Punchline\s*\n\s*([^\n#]+)/);
            
            const setup = setupMatch ? setupMatch[1].trim() : null;
            const punchline = punchlineMatch ? punchlineMatch[1].trim() : null;
            
            console.log('Setup:', setup);
            console.log('Punchline:', punchline);
            
            if (!setup) {
              throw new Error('Could not extract joke setup from issue body');
            }
            
            // Read current jokes file
            let content = fs.readFileSync(path, 'utf8');
            
            // Parse the file - it's module.exports = { all: [...] }
            const match = content.match(/module\.exports\s*=\s*\{\s*all:\s*(\[[\s\S]*\])\s*\}\s*;?/);
            if (!match) {
              throw new Error('Could not parse jokes.js file structure');
            }
            
            // Parse the array
            let jokes;
            try {
              jokes = eval(match[1]);
            } catch (e) {
              throw new Error('Failed to parse jokes array: ' + e.message);
            }
            
            // Add new joke
            const newJoke = {
              joke: setup,
              punchline: punchline || null
            };
            
            jokes.push(newJoke);
            
            // Write back
            const newContent = `module.exports = {\n    all: ${JSON.stringify(jokes, null, 2)}\n};\n`;
            fs.writeFileSync(path, newContent);
            
            console.log('Successfully added joke:', newJoke);
            
            // Set output for commit message
            core.setOutput('issue_number', context.payload.issue.number);
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/jokes.js
          git commit -m "Add joke from issue #${{ steps.extract.outputs.issue_number }}"
          git push
      
      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Your joke has been added to the collection! Thanks for contributing!'
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
