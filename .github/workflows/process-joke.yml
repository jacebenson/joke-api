name: Process Joke Submission

on:
  issues:
    types: [labeled]

jobs:
  add-joke:
    if: github.event.label.name == 'add-joke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Extract joke from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            console.log('Issue body:', body);
            
            // Split by lines
            const lines = body.split('\n').map(l => l.trim()).filter(l => l);
            
            // Find the joke setup - it's after "The Setup / Joke" line
            let setup = '';
            let punchline = null;
            
            for (let i = 0; i < lines.length; i++) {
              if (lines[i] === 'The Setup / Joke' && i + 1 < lines.length) {
                setup = lines[i + 1];
              }
              if (lines[i] === 'The Punchline' && i + 1 < lines.length) {
                const nextLine = lines[i + 1];
                if (nextLine && !nextLine.startsWith('Confirmation')) {
                  punchline = nextLine;
                }
              }
            }
            
            console.log('Extracted setup:', setup);
            console.log('Extracted punchline:', punchline);
            
            core.setOutput('setup', setup);
            core.setOutput('punchline', punchline || 'null');
            core.setOutput('issue_number', context.payload.issue.number);
      
      - name: Add joke to collection
        run: |
          node << 'EOF'
            const fs = require('fs');
            const path = './src/_data/jokes.js';
            
            // Read current jokes
            let content = fs.readFileSync(path, 'utf8');
            
            // Extract the array
            const match = content.match(/module\.exports = (\[[\s\S]*\]);/);
            if (!match) {
              console.error('Could not parse jokes file');
              process.exit(1);
            }
            
            const jokes = eval(match[1]);
            
            // Add new joke
            const newJoke = {
              joke: '${{ steps.extract.outputs.setup }}',
              punchline: ${{ steps.extract.outputs.punchline }}
            };
            
            jokes.push(newJoke);
            
            // Write back
            const newContent = `module.exports = ${JSON.stringify(jokes, null, 2)};`;
            fs.writeFileSync(path, newContent);
            
            console.log('Added joke:', newJoke);
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/jokes.js
          git commit -m "Add joke from issue #${{ steps.extract.outputs.issue_number }}"
          git push
      
      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Your joke has been added to the collection! Thanks for contributing!'
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
