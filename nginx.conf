server {
    # API routes
    location /api/ {
        alias /usr/share/nginx/html/api/;
        
        # For directory requests (/api/), serve index.html
        # For files, try the file, then file.json
        try_files $uri $uri.json $uri/index.html =404;
        
        # Default content type
        default_type application/json;
    }

    # Main site
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ =404;
    }

    # Handle 404 errors
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Handle server errors (50x)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
